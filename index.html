<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Timesheet">
<meta name="theme-color" content="#E8835A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>Nanny Timesheet</title>
<style>
:root {
  --accent: #E8835A;
  --accent-dark: #D4694A;
  --bg: #FFF8F0;
  --card: #FFFFFF;
  --text: #2D2D2D;
  --text-light: #888;
  --border: #F0E6DC;
  --danger: #E85A5A;
  --success: #5AAE6B;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 14px;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  padding-top: var(--safe-top);
  padding-bottom: calc(80px + var(--safe-bottom));
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: white;
  padding: 20px 20px 24px;
  text-align: center;
}
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
.header p { font-size: 13px; opacity: 0.85; margin-top: 2px; }

/* Tab bar */
.tabs {
  display: flex;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.tab {
  flex: 1;
  padding: 12px 0;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-light);
  border: none;
  background: none;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
  border-bottom: 2.5px solid transparent;
}
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* Sections */
.section { display: none; padding: 16px; animation: fadeIn 0.2s ease; }
.section.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* Cards */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-light);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.form-group input, .form-group select {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 17px;
  color: var(--text);
  background: var(--bg);
  -webkit-appearance: none;
  transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--accent);
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* Preview */
.preview {
  background: linear-gradient(135deg, #FFF5EE, #FFF0E6);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 16px;
  text-align: center;
}
.preview .hours { font-size: 28px; font-weight: 700; color: var(--accent-dark); }
.preview .pay { font-size: 15px; color: var(--text-light); margin-top: 4px; }
.preview .pay strong { color: var(--accent-dark); font-size: 18px; }

/* Buttons */
.btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; }
.btn-outline { background: none; border: 1.5px solid var(--border); color: var(--text); margin-top: 10px; }
.btn-danger { background: var(--danger); color: white; }
.btn-small { width: auto; padding: 8px 16px; font-size: 14px; border-radius: 8px; }

/* Summary stats */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}
.stat-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-card .label { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.stat-card .value { font-size: 24px; font-weight: 700; color: var(--accent-dark); margin-top: 4px; }
.stat-card .sub { font-size: 12px; color: var(--text-light); margin-top: 2px; }
.stat-card.wide { grid-column: 1 / -1; }

/* Entry list */
.entry-item {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.2s;
  cursor: pointer;
}
.entry-item:active { background: #FFF5EE; }
.entry-left { flex: 1; }
.entry-date { font-size: 15px; font-weight: 600; }
.entry-times { font-size: 13px; color: var(--text-light); margin-top: 2px; }
.entry-right { text-align: right; }
.entry-hours { font-size: 13px; color: var(--text-light); }
.entry-pay { font-size: 18px; font-weight: 700; color: var(--accent-dark); }
.entry-actions { display: flex; gap: 8px; margin-top: 8px; }
.entry-delete {
  background: none;
  border: none;
  color: var(--danger);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  padding: 4px 8px;
}
.entry-edit {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  padding: 4px 8px;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-light);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 1000;
  align-items: flex-end;
  justify-content: center;
  animation: fadeIn 0.15s ease;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px calc(24px + var(--safe-bottom));
  width: 100%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; text-align: center; }
.modal-close {
  position: absolute;
  right: 20px;
  top: 20px;
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: var(--text-light);
}

/* Toast */
.toast {
  position: fixed;
  bottom: calc(100px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: white;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 2000;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Data management */
.data-section { margin-top: 20px; }
.data-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.data-btns { display: flex; gap: 10px; }
.data-btns .btn { flex: 1; }

/* Period selector */
.period-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.period-btn {
  flex: 1;
  padding: 8px 0;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-light);
  cursor: pointer;
  transition: all 0.2s;
}
.period-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: #FFF5EE;
}

/* Custom date range */
.date-range {
  display: none;
  gap: 10px;
  margin-bottom: 16px;
  animation: fadeIn 0.2s ease;
}
.date-range.active { display: flex; }
.date-range .form-group { flex: 1; margin-bottom: 0; }
.date-range input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 15px;
  color: var(--text);
  background: var(--bg);
  -webkit-appearance: none;
}
.date-range input:focus { outline: none; border-color: var(--accent); }

/* Amount due banner */
.amount-due {
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  color: white;
  margin-bottom: 16px;
  box-shadow: 0 4px 16px rgba(232, 131, 90, 0.3);
}
.amount-due .due-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.85;
  font-weight: 600;
}
.amount-due .due-amount {
  font-size: 36px;
  font-weight: 800;
  margin-top: 4px;
  letter-spacing: -0.5px;
}
.amount-due .due-detail {
  font-size: 13px;
  opacity: 0.8;
  margin-top: 6px;
}
</style>
</head>
<body>

<div class="header">
  <h1>🕐 Nanny Timesheet</h1>
  <p>Track hours &amp; pay</p>
</div>

<div class="tabs">
  <button class="tab active" data-tab="add" onclick="switchTab('add')">Add Entry</button>
  <button class="tab" data-tab="log" onclick="switchTab('log')">Log</button>
  <button class="tab" data-tab="summary" onclick="switchTab('summary')">Summary</button>
</div>

<!-- ADD ENTRY -->
<div id="tab-add" class="section active">
  <div class="card">
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="entry-date">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Start Time</label>
        <input type="time" id="entry-start">
      </div>
      <div class="form-group">
        <label>End Time</label>
        <input type="time" id="entry-end">
      </div>
    </div>
    <div class="form-group">
      <label>Hourly Rate ($)</label>
      <input type="number" id="entry-rate" value="20" min="0" step="0.50" inputmode="decimal">
    </div>
    <div class="preview" id="preview" style="display:none">
      <div class="hours" id="preview-hours">0h 0m</div>
      <div class="pay">Total: <strong id="preview-pay">$0.00</strong></div>
    </div>
    <button class="btn btn-primary" id="save-btn" onclick="saveEntry()">Save Entry</button>
  </div>
</div>

<!-- LOG -->
<div id="tab-log" class="section">
  <div id="log-list"></div>
  <div id="log-empty" class="empty-state" style="display:none">
    <div class="icon">📋</div>
    <p>No entries yet.<br>Add your first entry to get started!</p>
  </div>
</div>

<!-- SUMMARY -->
<div id="tab-summary" class="section">
  <div class="period-selector">
    <button class="period-btn active" data-period="week" onclick="setPeriod('week')">This Week</button>
    <button class="period-btn" data-period="month" onclick="setPeriod('month')">This Month</button>
    <button class="period-btn" data-period="all" onclick="setPeriod('all')">All Time</button>
    <button class="period-btn" data-period="custom" onclick="setPeriod('custom')">Custom</button>
  </div>
  <div class="date-range" id="date-range">
    <div class="form-group">
      <label>From</label>
      <input type="date" id="range-start" onchange="renderSummary()">
    </div>
    <div class="form-group">
      <label>To</label>
      <input type="date" id="range-end" onchange="renderSummary()">
    </div>
  </div>
  <div class="amount-due" id="amount-due">
    <div class="due-label">Amount Due</div>
    <div class="due-amount" id="due-amount">$0.00</div>
    <div class="due-detail" id="due-detail">0 entries · 0h 0m</div>
  </div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">Total Hours</div>
      <div class="value" id="sum-hours">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Pay</div>
      <div class="value" id="sum-pay">$0</div>
    </div>
    <div class="stat-card">
      <div class="label">Entries</div>
      <div class="value" id="sum-entries">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Avg Per Day</div>
      <div class="value" id="sum-avg">$0</div>
    </div>
  </div>
  <div class="data-section">
    <h3>Data Management</h3>
    <div class="data-btns">
      <button class="btn btn-outline btn-small" onclick="exportCSV()">📤 Export CSV</button>
      <button class="btn btn-outline btn-small" onclick="document.getElementById('csv-import').click()">📥 Import CSV</button>
    </div>
    <input type="file" id="csv-import" accept=".csv" style="display:none" onchange="importCSV(event)">
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h2>Edit Entry</h2>
    <input type="hidden" id="edit-id">
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="edit-date">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Start Time</label>
        <input type="time" id="edit-start">
      </div>
      <div class="form-group">
        <label>End Time</label>
        <input type="time" id="edit-end">
      </div>
    </div>
    <div class="form-group">
      <label>Hourly Rate ($)</label>
      <input type="number" id="edit-rate" min="0" step="0.50" inputmode="decimal">
    </div>
    <button class="btn btn-primary" onclick="updateEntry()">Update</button>
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal" style="text-align:center;">
    <h2>Delete Entry?</h2>
    <p style="color:var(--text-light); margin-bottom:20px;" id="delete-desc">This cannot be undone.</p>
    <input type="hidden" id="delete-id">
    <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    <button class="btn btn-outline" onclick="closeDeleteModal()">Cancel</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── State ───
const STORAGE_KEY = 'nanny_timesheet_entries';
let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currentPeriod = 'week';

// ─── Tabs ───
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'tab-' + tab));
  if (tab === 'log') renderLog();
  if (tab === 'summary') renderSummary();
}

// ─── Form defaults ───
function initForm() {
  const today = new Date();
  document.getElementById('entry-date').value = formatDateLocal(today);
}

function formatDateLocal(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// ─── Auto-calculate preview ───
function calcHours(start, end) {
  if (!start || !end) return 0;
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  let mins = (eh * 60 + em) - (sh * 60 + sm);
  if (mins <= 0) mins += 24 * 60; // crosses midnight
  return mins / 60;
}

function updatePreview() {
  const start = document.getElementById('entry-start').value;
  const end = document.getElementById('entry-end').value;
  const rate = parseFloat(document.getElementById('entry-rate').value) || 0;
  const preview = document.getElementById('preview');

  if (start && end) {
    const hours = calcHours(start, end);
    const h = Math.floor(hours);
    const m = Math.round((hours - h) * 60);
    document.getElementById('preview-hours').textContent = `${h}h ${m}m`;
    document.getElementById('preview-pay').textContent = `$${(hours * rate).toFixed(2)}`;
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
}

['entry-start','entry-end','entry-rate'].forEach(id => {
  document.getElementById(id).addEventListener('input', updatePreview);
});

// ─── Save ───
function saveEntry() {
  const date = document.getElementById('entry-date').value;
  const start = document.getElementById('entry-start').value;
  const end = document.getElementById('entry-end').value;
  const rate = parseFloat(document.getElementById('entry-rate').value);

  if (!date || !start || !end || isNaN(rate)) {
    showToast('Please fill in all fields');
    return;
  }

  const hours = calcHours(start, end);
  const entry = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    date, start, end, rate, hours,
    total: +(hours * rate).toFixed(2)
  };

  entries.push(entry);
  persist();
  showToast('Entry saved! ✓');

  // Reset form for next entry
  document.getElementById('entry-start').value = '';
  document.getElementById('entry-end').value = '';
  document.getElementById('preview').style.display = 'none';
  initForm();
}

function persist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

// ─── Log ───
function renderLog() {
  const list = document.getElementById('log-list');
  const empty = document.getElementById('log-empty');

  if (entries.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  const sorted = [...entries].sort((a, b) => {
    if (a.date !== b.date) return b.date.localeCompare(a.date);
    return b.start.localeCompare(a.start);
  });

  list.innerHTML = sorted.map(e => {
    const h = Math.floor(e.hours);
    const m = Math.round((e.hours - h) * 60);
    const dateObj = new Date(e.date + 'T00:00:00');
    const dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    return `
      <div class="entry-item" onclick="openEdit('${e.id}')">
        <div class="entry-left">
          <div class="entry-date">${dateStr}</div>
          <div class="entry-times">${formatTime(e.start)} – ${formatTime(e.end)} · ${h}h ${m}m · $${e.rate}/hr</div>
        </div>
        <div class="entry-right">
          <div class="entry-pay">$${e.total.toFixed(2)}</div>
          <div class="entry-actions">
            <button class="entry-edit" onclick="event.stopPropagation(); openEdit('${e.id}')">Edit</button>
            <button class="entry-delete" onclick="event.stopPropagation(); openDelete('${e.id}')">Delete</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function formatTime(t) {
  const [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hr = h % 12 || 12;
  return `${hr}:${String(m).padStart(2,'0')} ${ampm}`;
}

// ─── Edit ───
function openEdit(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-date').value = e.date;
  document.getElementById('edit-start').value = e.start;
  document.getElementById('edit-end').value = e.end;
  document.getElementById('edit-rate').value = e.rate;
  document.getElementById('edit-modal').classList.add('active');
}

function updateEntry() {
  const id = document.getElementById('edit-id').value;
  const idx = entries.findIndex(x => x.id === id);
  if (idx === -1) return;

  const date = document.getElementById('edit-date').value;
  const start = document.getElementById('edit-start').value;
  const end = document.getElementById('edit-end').value;
  const rate = parseFloat(document.getElementById('edit-rate').value);

  if (!date || !start || !end || isNaN(rate)) {
    showToast('Please fill in all fields');
    return;
  }

  const hours = calcHours(start, end);
  entries[idx] = { ...entries[idx], date, start, end, rate, hours, total: +(hours * rate).toFixed(2) };
  persist();
  closeModal();
  renderLog();
  showToast('Entry updated ✓');
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('active');
}

// ─── Delete ───
function openDelete(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  const dateObj = new Date(e.date + 'T00:00:00');
  const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  document.getElementById('delete-desc').textContent = `${dateStr} — ${formatTime(e.start)} to ${formatTime(e.end)} ($${e.total.toFixed(2)})`;
  document.getElementById('delete-id').value = id;
  document.getElementById('delete-modal').classList.add('active');
}

function confirmDelete() {
  const id = document.getElementById('delete-id').value;
  entries = entries.filter(x => x.id !== id);
  persist();
  closeDeleteModal();
  renderLog();
  showToast('Entry deleted');
}

function closeDeleteModal() {
  document.getElementById('delete-modal').classList.remove('active');
}

// ─── Summary ───
function setPeriod(p) {
  currentPeriod = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.dataset.period === p));
  document.getElementById('date-range').classList.toggle('active', p === 'custom');
  renderSummary();
}

function renderSummary() {
  const now = new Date();
  let filtered = entries;
  let periodLabel = '';

  if (currentPeriod === 'week') {
    const day = now.getDay();
    const start = new Date(now);
    start.setDate(now.getDate() - day);
    start.setHours(0,0,0,0);
    const startStr = formatDateLocal(start);
    filtered = entries.filter(e => e.date >= startStr);
    periodLabel = 'this week';
  } else if (currentPeriod === 'month') {
    const startStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-01';
    filtered = entries.filter(e => e.date >= startStr);
    periodLabel = 'this month';
  } else if (currentPeriod === 'custom') {
    const rangeStart = document.getElementById('range-start').value;
    const rangeEnd = document.getElementById('range-end').value;
    if (rangeStart && rangeEnd) {
      filtered = entries.filter(e => e.date >= rangeStart && e.date <= rangeEnd);
      const startDate = new Date(rangeStart + 'T00:00:00');
      const endDate = new Date(rangeEnd + 'T00:00:00');
      periodLabel = startDate.toLocaleDateString('en-US', {month:'short',day:'numeric'}) + ' – ' + endDate.toLocaleDateString('en-US', {month:'short',day:'numeric'});
    } else {
      filtered = [];
      periodLabel = 'select dates';
    }
  } else {
    periodLabel = 'all time';
  }

  const totalHours = filtered.reduce((s, e) => s + e.hours, 0);
  const totalPay = filtered.reduce((s, e) => s + e.total, 0);
  const uniqueDays = new Set(filtered.map(e => e.date)).size;
  const avgPerDay = uniqueDays > 0 ? totalPay / uniqueDays : 0;

  const h = Math.floor(totalHours);
  const m = Math.round((totalHours - h) * 60);

  // Update amount due banner
  document.getElementById('due-amount').textContent = `$${totalPay.toFixed(2)}`;
  document.getElementById('due-detail').textContent = `${filtered.length} entr${filtered.length === 1 ? 'y' : 'ies'} · ${h}h ${m}m · ${periodLabel}`;

  document.getElementById('sum-hours').textContent = `${h}h ${m}m`;
  document.getElementById('sum-pay').textContent = `$${totalPay.toFixed(2)}`;
  document.getElementById('sum-entries').textContent = filtered.length;
  document.getElementById('sum-avg').textContent = `$${avgPerDay.toFixed(2)}`;
}

// ─── CSV Export ───
function exportCSV() {
  if (entries.length === 0) {
    showToast('No entries to export');
    return;
  }
  const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date));
  const rows = [['Date','Start','End','Hours','Rate','Total']];
  sorted.forEach(e => {
    rows.push([e.date, e.start, e.end, e.hours.toFixed(2), e.rate.toFixed(2), e.total.toFixed(2)]);
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `nanny-timesheet-${formatDateLocal(new Date())}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exported ✓');
}

// ─── CSV Import ───
function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const lines = e.target.result.trim().split('\n');
    let imported = 0;
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',');
      if (cols.length < 6) continue;
      const [date, start, end, hours, rate, total] = cols;
      entries.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6) + i,
        date: date.trim(),
        start: start.trim(),
        end: end.trim(),
        rate: parseFloat(rate),
        hours: parseFloat(hours),
        total: parseFloat(total)
      });
      imported++;
    }
    persist();
    showToast(`Imported ${imported} entries ✓`);
    renderLog();
    renderSummary();
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ─── Toast ───
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Close modals on overlay tap ───
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('delete-modal').addEventListener('click', function(e) {
  if (e.target === this) closeDeleteModal();
});

// ─── Init ───
initForm();

// Register SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
